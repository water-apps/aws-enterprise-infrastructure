name: "Terraform — Validate & Security Scan"

on:
  push:
    branches: [main]
    paths: ['**/*.tf', '**/*.tfvars.example', '.github/workflows/terraform-ci.yml', '.github/workflows/terraform-pr-plan.yml']
  pull_request:
    branches: [main]
    paths: ['**/*.tf', '**/*.tfvars.example', '.github/workflows/terraform-ci.yml', '.github/workflows/terraform-pr-plan.yml']

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"

jobs:
  detect-modules:
    name: "Detect changed modules"
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: find
        name: Find Terraform modules
        run: |
          modules=$(find . -maxdepth 1 -type d -name '[0-9]*' | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "Found modules: $modules"

  validate:
    name: "Validate — ${{ matrix.module }}"
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -recursive

  security-scan:
    name: "Security Scan — tfsec"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          soft_fail: true
          format: lovely

      - name: Run checkov
        uses: bridgecrewio/checkov-action@f9b0a2206b0401cad02ac0a66be2a7934a5be838
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli

  cost-estimate:
    name: "Cost Estimate — Infracost"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        continue-on-error: true

      - name: Generate cost estimate
        run: |
          if command -v infracost &> /dev/null; then
            infracost breakdown --path . --format table
          else
            echo "Infracost not configured — skipping cost estimate"
            echo "To enable: add INFRACOST_API_KEY to repository secrets"
          fi
        continue-on-error: true

  summary:
    name: "Pipeline Summary"
    needs: [validate, security-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "::error::Terraform CI failed (validate=${{ needs.validate.result }}, security=${{ needs.security-scan.result }})"
            exit 1
          fi
          echo "## Terraform CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate & Format | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Pipeline ran on $(date -u '+%Y-%m-%d %H:%M UTC')*" >> $GITHUB_STEP_SUMMARY
